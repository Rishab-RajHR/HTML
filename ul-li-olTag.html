<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UL LI OL Tags in HTML</title>
</head>
<body>

     <!-- ul tags used for unodered list (bullet points)-->
     <!-- type can be square , circle rectangle -->
     <ul type="circle">
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
     </ul>

     <!-- ol is used for ordered list -->
      <!-- type can be number, Aplhanumeric -->
      <ol type="A">
         <li>Home</li>
         <li>About</li>
         <li>Contact</li>
      </ol>

</body>
</html>
