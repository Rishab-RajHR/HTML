<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbols in HTML</title>
</head>
<body>
      <!-- copyright -->
      <p>This is copyright &copy;</p>
      <!-- euro -->
      <p>This is euro &euro;</p>
      <!-- left arrow -->
      <p>This is left arrow &larr;</p>
      <!-- right arrow -->
      <p>This is right arrow &rarr;</p>
      <!-- down arrow-->
      <p>This is down arrow &darr;</p>
      <!-- up arrow -->
      <p>This is up arrow &uarr;</p>
      <!-- hearts -->
      <p>This is my heart &hearts;</p>
</body>
</html>
