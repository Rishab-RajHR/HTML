<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class and Id in HTML</title>
  <style>
    /* id access */
    #demoClass{
        background-color: aqua;
    }
    /* class access */
    .demoClass{
        background-color: blue;
        color: azure;
    }
       
  </style>
</head>
<body>
    <!-- id uniquely identifier -->
    <p id="demoClass">This is Hungama Channel</p>

     <!-- class multiple -->
      <h1 class="demoClass">Alex Pandian</h1>
  
</body>
</html>
