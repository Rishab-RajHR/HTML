<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables in HTML</title>
</head>
<body>
   <!-- rowspan will take place of the row -->
   <!-- colspan will take place of the col -->
   <table border="1">
      <tr>
         <th>Name</th>
         <th>Class</th>
         <th>Contact</th>
      </tr>
      <tr>
         <td>Alex</td>
         <td>6</td>
         <td>123456</td>
      </tr>
      <tr>
         <td>Tovino</td>
         <td>8</td>
         <td>523456</td>
      </tr>
      <tr>
         <td>George</td>
         <td>4</td>
         <td>823456</td>
      </tr>
   </table>
  
</body>
</html>
