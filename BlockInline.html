<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block and Inline  Elements in HTML</title>
</head>
<body>
     <!-- block  elements => takes whole space -->
     <p>Alex</p> <p>This is Pandian</p>
    
      <!-- Inline  elements => takes space how much required -->
    <span>Alex</span> <span>This is Pandian</span>
  
</body>
</html>
