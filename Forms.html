<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms in HTML</title>
</head>
<body>
    <h1>Form in HTML</h1>
    <form action="">
         <label for="name">Name</label>
          <input type="text">
         <label for="email">Email</label>
          <input type="email">
         <label for="password">Password</label>
          <input type="password">
          <select name="car" id="car">
               <option value="Corolla">Hyundai</option>
               <option value="Corolla">Swift</option>
               <option value="Corolla">Altos</option>
               <option value="Corolla">Mahindra</option>
          </select>
          <input type="submit" value="Submit Now">
    </form>
</body>
</html>
